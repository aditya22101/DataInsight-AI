version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
    depends_on:
      - mongodb
    healthcheck:
      test: ["CMD", "python", "-c", "import pandas; print('DataForge Healthy ✅')"]
      interval: 30s
      timeout: 10s
      retries: 3
  
  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
